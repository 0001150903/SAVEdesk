<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SAVEdesk — Dashboard Técnico</title>
  <style>
    :root{ --bg:#071023; --panel:#08182a; --muted:#9aa4b2; --accent:#2e7be6; --ok:#2aa56a }
    html,body{height:100%;margin:0;font-family:Inter,Segoe UI,system-ui,Arial;background:linear-gradient(180deg,#03121a,#071422);color:#e6eef8}
    .user-wrap{max-width:1100px;margin:28px auto;padding:16px}
    .user-header{display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;gap:12px;align-items:center}
    .controls{display:flex;gap:8px}
    .btn{background:var(--accent);color:#fff;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;font-weight: 600}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06)}

    .kanban-area{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:16px}
    .kanban-column{background:linear-gradient(180deg,#071722,#061422);padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.03)}
    .kanban-column h3{margin:0 0 8px 0}
    .kanban-list{min-height:120px}
    .kanban-card{background:#071a2b;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);cursor:grab}
    .kanban-card.dragging{opacity:0.6}
    .kanban-card .meta{font-size:12px;color:var(--muted);margin-top:8px}
    .timestamps{font-size:11px;color:var(--muted);margin-top:6px}

    /* Cartão extras */
    .id{font-weight:700;color:#f28a30}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;color:#fff;margin-top:6px}
    /* Status colors: pendente = vermelho, em andamento = amarelo, concluído = verde */
    .badge.pending{background:#ef4444}
    .badge.doing{background:#f59e0b;color:#0b1220}
    .badge.done{background:#10b981}

    .modal{position:fixed;left:0;top:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,0.8);z-index:100}
    .modal.hidden{display:none}
    .modal-panel{background:linear-gradient(180deg,#071428,#08182a);padding:24px;border-radius:10px;min-width:400px;color:#dfe9f8;border:1px solid rgba(255,255,255,0.1);box-shadow:0 10px 25px rgba(0,0,0,0.5)}

    label{display:block;margin-top:10px;color:var(--muted)}
    input,select,textarea{width:100%;padding:8px;margin-top:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:#fff;color:#0b1220}
    .hidden{display:none}

    /* Estilos atualizados para o Chat (Flexbox) */
    #chatMessages {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-msg {
      max-width: 85%;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.4;
      word-wrap: break-word;
      display: flex;
      flex-direction: column;
    }
    .chat-msg.me {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-radius: 14px 14px 2px 14px;
    }
    .chat-msg.other {
      align-self: flex-start;
      background: rgba(255,255,255,0.08);
      color: #eaf2ff;
      border-radius: 14px 14px 14px 2px;
    }
    .chat-meta {
      font-size: 10px;
      opacity: 0.75;
      margin-bottom: 4px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="user-wrap">
    <header class="user-header">
      <div class="brand">
        <img src="mídia/Logo.svg" alt="Logo" style="width:42px;height:42px;border-radius:8px">
        <div>
          <h1 style="margin:0">SAVEdesk — Técnico</h1>
          <div style="color:var(--muted);font-size:13px">Quadro Kanban</div>
        </div>
      </div>

      <div class="controls">
        <input id="globalSearch" class="search" placeholder="Pesquisar por id, solicitante, setor, categoria, descrição" />
        <button id="openAddBtn" class="btn">Novo Chamado</button>
        <button id="refreshBtn" class="btn">Atualizar Sistema</button>
        <button id="resetBtn" class="btn ghost">Ocultar Concluídos</button>
        <button id="logoutBtn" class="btn ghost" style="border-color:#ef4444; color:#ef4444;">Sair</button>
      </div>
    </header>

    <section class="kanban-area">
      <div class="kanban-column">
        <h3>Pendente</h3>
        <div class="kanban-list" data-status="pending"></div>
      </div>
      <div class="kanban-column">
        <h3>Em Andamento</h3>
        <div class="kanban-list" data-status="doing"></div>
      </div>
      <div class="kanban-column">
        <h3>Concluídos</h3>
        <div class="kanban-list" data-status="done"></div>
      </div>
    </section>
  </main>

  <!-- Modal de Novo Chamado -->
  <div id="addModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <h2 style="margin-top:0">Novo Chamado</h2>
      <form id="addForm">
        <label>Solicitante<input id="author" type="text" placeholder="Seu nome" required></label>
        <label>Setor
          <select id="setor">
            <option value="">-- Escolha --</option>
            <option value="Producao A">Produção A</option>
            <option value="Producao B">Produção B</option>
            <option value="ADM">ADM</option>
            <option value="Almoxarifado">Almoxarifado</option>
            <option value="outro">Outro</option>
          </select>
        </label>
        <label>Categoria
          <select id="issueType">
            <option value="">-- Escolha --</option>
            <option value="impressora">Impressora</option>
            <option value="mouse">Mouse</option>
            <option value="senha">Senha</option>
            <option value="rede">Rede</option>
            <option value="outro">Outro</option>
          </select>
        </label>
        <label id="otherLabel" class="hidden">Descreva (Outro)
          <input id="otherText" placeholder="Descreva o problema" />
        </label>
        <div id="addFormFeedback" class="helper hidden"></div>
        <label>Prioridade
          <select id="priority">
            <option value="normal">Normal</option>
            <option value="alta">Alta</option>
            <option value="baixa">Baixa</option>
          </select>
        </label>
        <label>Descrição<textarea id="description" rows="3" placeholder="Informações adicionais (opcional)"></textarea></label>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
          <button type="button" id="cancelAdd" class="btn ghost">Cancelar</button>
          <button type="submit" class="btn">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de Chat -->
  <div id="chatModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-panel" style="width:480px;max-width:95%;display:flex;flex-direction:column;max-height:80vh;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-weight:700">Interações <span id="chatModalHeaderId" style="color:var(--muted);font-weight:600;margin-left:8px">#</span></div>
        <button id="closeChatBtn" style="background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer">✖</button>
      </div>
      <div id="chatMessages" style="flex:1;overflow:auto;padding:16px;border-radius:6px;background:linear-gradient(180deg,#051322,#061427);border:1px solid rgba(255,255,255,0.03);margin-bottom:8px">Nenhuma mensagem.</div>
      <form id="chatForm" style="display:flex;gap:8px">
        <input id="chatInput" type="text" placeholder="Escreva uma mensagem..." autocomplete="off" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:#fff;color:#0b1220" />
        <button type="submit" class="btn">Enviar</button>
      </form>
    </div>
  </div>

  <!-- Modal de Triagem -->
  <div id="triageModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-panel" style="min-width:360px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-weight:700">Triagem <span id="triageChamadoId" style="color:var(--muted);font-weight:600;margin-left:8px">#</span></div>
        <button id="closeTriageBtnX" style="background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer">✖</button>
      </div>
      <label>Prioridade
        <select id="triagemPrioridade">
          <option value="baixa">Baixa</option>
          <option value="normal">Normal</option>
          <option value="alta">Alta</option>
          <option value="urgente">Urgente</option>
        </select>
      </label>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
        <button type="button" id="closeTriageBtn" class="btn ghost">Cancelar</button>
        <button type="button" id="triageSaveBtn" class="btn" style="background:var(--accent);border:none;color:#fff;padding:8px 12px;border-radius:6px">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    // Todo o script consolidado num único bloco e escopo
    document.addEventListener('DOMContentLoaded', () => {
      
      // Validação de Sessão
      if(!sessionStorage.getItem('ompi_token')){ location.href = 'index.html'; return; }
      
      const rawRole = sessionStorage.getItem('ompi_current_role') || '';
      const currentRole = String(rawRole).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^\x00-\x7F]/g, '');
      if(!(currentRole === 'tecnico' || currentRole === 'tec')){ location.href = 'index.html'; return; }

      // Logout
      document.getElementById('logoutBtn').addEventListener('click', () => {
        sessionStorage.clear();
        location.href = 'index.html';
      });

      function getAuthHeaders() {
        const token = sessionStorage.getItem('ompi_token') || '';
        return {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        };
      }

      // API
      const api = {
        async fetchChamados() {
          const res = await fetch('api_chamados.php', { method: 'GET', headers: getAuthHeaders() });
          const text = await res.text().catch(()=>null);
          if (!res.ok) throw new Error(text || ('Erro ' + res.status));
          try{ return JSON.parse(text||'[]'); }catch(e){ return []; }
        },
        async createChamado(item) {
          const res = await fetch('api_chamados.php', { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify(item) });
          if (!res.ok) throw new Error('Erro ao criar chamado');
          return res.json();
        },
        async updateChamado(id, updates) {
          const res = await fetch(`api_chamados.php?id=${id}`, { method: 'PATCH', headers: getAuthHeaders(), body: JSON.stringify(updates) });
          if (!res.ok) throw new Error('Erro ao atualizar chamado');
          return res.json();
        }
      };

      // Utilitários
      function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
      function escapeHtml(s){ return String(s||'').replace(/[&<>\"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c])); }
      function currentUser(){ return sessionStorage.getItem('ompi_current_user') || sessionStorage.getItem('ompi_user_name') || ''; }

      // Variáveis Globais de Estado
      let data = [];
      let chatChamadoId = null;
      let showOnlyOpen = false;
      let hideCompleted = false;

      // Elementos do DOM
      const lists = document.querySelectorAll('.kanban-list');
      const openBtn = document.getElementById('openAddBtn');
      const modalAdd = document.getElementById('addModal');
      const addForm = document.getElementById('addForm');
      const cancelBtn = document.getElementById('cancelAdd');
      const searchEl = document.getElementById('globalSearch');
      
      const refreshBtn = document.getElementById('refreshBtn');
      const resetBtn = document.getElementById('resetBtn');

      // Elementos do Chat
      const chatModal = document.getElementById('chatModal');
      const closeChatBtn = document.getElementById('closeChatBtn');
      const chatForm = document.getElementById('chatForm');
      const chatInput = document.getElementById('chatInput');
      
      // Elementos da Triagem
      const triageModal = document.getElementById('triageModal');
      const triageSaveBtn = document.getElementById('triageSaveBtn');
      const closeTriageBtn = document.getElementById('closeTriageBtn');
      const closeTriageBtnX = document.getElementById('closeTriageBtnX');
      const triagemPrioridade = document.getElementById('triagemPrioridade');

      // --- Funções de Renderização e Cards ---
      function createCard(item){
        const el = document.createElement('div');
        el.className = 'kanban-card';
        el.dataset.id = String(item.id);
        
        const shortId = String(item.id).slice(-6);
        const statusClass = item.status === 'doing' ? 'doing' : (item.status === 'done' ? 'done' : 'pending');
        const statusLabel = item.status === 'doing' ? 'Em Andamento' : (item.status === 'done' ? 'Concluído' : 'Pendente');
        const categoria = escapeHtml((item.categoria||'').toString());
        
        el.innerHTML = `
          <div class="id">#${shortId}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            <div style="font-weight:700">${categoria}</div>
            <div><span class="badge ${statusClass}">${statusLabel}</span></div>
          </div>
          <div style="margin-top:6px; font-size:13px">${escapeHtml(item.descricao||'')}</div>
          <div class="meta">${escapeHtml(item.solicitante||'')} • ${escapeHtml(item.setor||'')}</div>
          <div class="timestamps">
            <small>Abertura: ${item.data_abertura ? new Date(item.data_abertura).toLocaleString() : '-'}</small><br/>
            <small>Início: ${item.data_inicio ? new Date(item.data_inicio).toLocaleString() : '-'}</small><br/>
            <small>Conclusão: ${item.data_conclusao ? new Date(item.data_conclusao).toLocaleString() : '-'}</small>
          </div>`;
        return el;
      }

      function attachHandlers(){
        document.querySelectorAll('.kanban-card').forEach(card => {
          card.draggable = true;
          card.addEventListener('dragstart', onDragStart);
          card.addEventListener('dragend', onDragEnd);
          card.style.cursor = 'grab';
        });
        lists.forEach(list => {
          list.addEventListener('dragover', onDragOver);
          list.addEventListener('drop', onDrop);
        });
      }

      function render(){
        const q = (searchEl && searchEl.value||'').trim().toLowerCase();
        lists.forEach(l => l.innerHTML='');
        
        data.forEach(item => {
          if(String(item.status).toLowerCase() === 'archived' || String(item.status).toLowerCase() === 'arquivado') return;
          const st = String(item.status||'').toLowerCase();
          if(hideCompleted && (st === 'done' || st.indexOf('conclu') !== -1)) return;
          
          if(q){ const hay = [item.id,item.solicitante,item.setor,item.categoria,item.descricao,item.prioridade,item.status].join(' ').toLowerCase(); if(hay.indexOf(q)===-1) return; }
          
          const target = item.status === 'doing' ? 'doing' : (item.status === 'done' ? 'done' : 'pending');
          const container = document.querySelector(`.kanban-list[data-status="${target}"]`);
          
          if(container){
            const card = createCard(item);
            
            // Botões de Ação Dinâmicos
            const chatBtn = document.createElement('button');
            chatBtn.textContent = '💬 Interações';
            chatBtn.className = 'btn';
            chatBtn.style.marginLeft = '8px';
            chatBtn.style.fontSize = '12px';
            chatBtn.addEventListener('click', () => abrirChat(String(item.id)));
            
            const triagemBtn = document.createElement('button');
            triagemBtn.textContent = '⚙️ Prioridade';
            triagemBtn.className = 'btn ghost';
            triagemBtn.style.marginLeft = '8px';
            triagemBtn.style.fontSize = '12px';
            triagemBtn.addEventListener('click', () => abrirTriagem(String(item.id), String(item.prioridade||'normal')));
            
            const footer = document.createElement('div'); 
            footer.style.display='flex'; 
            footer.style.justifyContent='flex-end'; 
            footer.style.marginTop='10px'; 
            footer.appendChild(chatBtn);
            footer.appendChild(triagemBtn);
            
            card.appendChild(footer);
            container.appendChild(card);
          }
        });
        attachHandlers();
      }

      // --- Funções de Drag and Drop ---
      let dragged = null;
      function onDragStart(e){ dragged = this; this.classList.add('dragging'); e.dataTransfer.setData('text/plain', this.dataset.id); }
      function onDragEnd(){ this.classList.remove('dragging'); dragged = null; }
      function onDragOver(e){ e.preventDefault(); }
      async function onDrop(e){
        e.preventDefault();
        const id = e.dataTransfer.getData('text/plain');
        const it = data.find(d => String(d.id) === String(id));
        if(!it) return;
        const newStatus = this.dataset.status;
        const patch = { status: newStatus, updated_at: new Date().toISOString() };
        if(newStatus === 'doing' && !it.data_inicio) patch.data_inicio = new Date().toISOString();
        if(newStatus === 'done' && !it.data_conclusao) patch.data_conclusao = new Date().toISOString();
        try {
          const updated = await api.updateChamado(it.id, patch);
          Object.assign(it, updated || {});
          data = data.map(d => String(d.id) === String(it.id) ? it : d);
          render();
        } catch(err) { alert('Erro ao atualizar status do chamado.'); }
      }

      // --- Funções de Triagem ---
      function abrirTriagem(id, prioridadeAtual){
        triageModal.classList.remove('hidden');
        document.getElementById('triageChamadoId').textContent = '#' + String(id).slice(-6);
        triagemPrioridade.value = prioridadeAtual || 'normal';
        triageModal.dataset.chamadoId = String(id);
      }

      function fecharTriagem(){ triageModal.classList.add('hidden'); triageModal.dataset.chamadoId = ''; }
      closeTriageBtn.addEventListener('click', fecharTriagem);
      closeTriageBtnX.addEventListener('click', fecharTriagem);

      triageSaveBtn.addEventListener('click', async () => {
        const novaPrioridade = triagemPrioridade.value;
        const chamadoId = triageModal.dataset.chamadoId; 
        if (!chamadoId) return alert('Erro: ID não identificado.');

        triageSaveBtn.disabled = true;
        triageSaveBtn.textContent = 'Salvando...';

        try {
          // Utilizando a API já configurada internamente no invés do fetch solto
          await api.updateChamado(chamadoId, { prioridade: novaPrioridade });
          fecharTriagem();
          await refreshAll(); // Chama o refresh local sem precisar recarregar o F5 na página
        } catch (error) {
          alert('Erro ao salvar triagem: ' + error.message);
        } finally {
          triageSaveBtn.disabled = false;
          triageSaveBtn.textContent = 'Salvar';
        }
      });

      // --- Funções de Chat ---
      function abrirChat(id){
        chatChamadoId = String(id);
        document.getElementById('chatModalHeaderId').textContent = '#' + String(chatChamadoId).slice(-6);
        chatModal.classList.remove('hidden');
        carregarMensagens();
      }

      closeChatBtn.addEventListener('click', () => {
        chatModal.classList.add('hidden');
        chatChamadoId = null;
      });

      async function carregarMensagens(){
        if(!chatChamadoId) return;
        const listEl = document.getElementById('chatMessages'); 
        listEl.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;">Carregando...</div>';
        
        try {
          const res = await fetch(`api_comentarios.php?chamado_id=${encodeURIComponent(chatChamadoId)}`, { headers: getAuthHeaders() });
          if(!res.ok) throw new Error('HTTP '+res.status);
          const msgs = await res.json(); 
          listEl.innerHTML = '';
          
          if(msgs.length === 0) {
            listEl.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;">Nenhuma interação ainda.</div>';
            return;
          }

          const me = currentUser();
          msgs.forEach(m => {
            const div = document.createElement('div'); 
            const isMe = String(m.autor).trim().toLowerCase() === String(me).trim().toLowerCase();
            
            div.className = 'chat-msg ' + (isMe ? 'me' : 'other');
            
            // Formatando o visual da conversa (Semelhante ao WhatsApp)
            const hora = new Date(m.data_envio).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `
              <div class="chat-meta">${escapeHtml(m.autor)} • ${hora}</div>
              <div>${escapeHtml(m.mensagem)}</div>
            `;
            listEl.appendChild(div);
          });
          listEl.scrollTop = listEl.scrollHeight;
        } catch(err) { 
          listEl.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;">Erro ao carregar mensagens.</div>'; 
        }
      }

      chatForm.addEventListener('submit', async (e) => { 
        e.preventDefault(); 
        const text = (chatInput.value||'').trim(); 
        if(!text) return; 
        
        const autor = currentUser() || 'Técnico'; 
        try { 
          const res = await fetch('api_comentarios.php', {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({chamado_id: chatChamadoId, autor, mensagem: text})
          }); 
          if(!res.ok) throw new Error('HTTP '+res.status); 
          chatInput.value = ''; 
          await carregarMensagens(); 
        } catch(err) { 
          alert('Falha ao enviar mensagem.'); 
        } 
      });

      // --- Operações Globais de Dados ---
      async function refreshAll(){ 
        try { 
          data = await api.fetchChamados(); 
          data.sort((a,b)=> (Number(a.id)||0) - (Number(b.id)||0)); 
          render(); 
        } catch(e) { 
          showErrorBanner(e.message || String(e)); 
        } 
      }

      // Eventos de Filtro e Busca
      if(searchEl) searchEl.addEventListener('input', render);
      
      if(refreshBtn) refreshBtn.addEventListener('click', async () => {
        refreshBtn.disabled = true; refreshBtn.textContent = 'Atualizando...';
        await refreshAll();
        refreshBtn.disabled = false; refreshBtn.textContent = 'Atualizar Sistema';
      });

      if(resetBtn) resetBtn.addEventListener('click', () => {
        hideCompleted = !hideCompleted;
        resetBtn.textContent = hideCompleted ? 'Mostrar Concluídos' : 'Ocultar Concluídos';
        render();
      });

      if(openBtn) openBtn.addEventListener('click', () => { 
        addForm.reset(); 
        modalAdd.classList.remove('hidden'); 
        const authorEl = document.getElementById('author'); 
        if(authorEl) authorEl.value = currentUser(); 
      });
      if(cancelBtn) cancelBtn.addEventListener('click', () => { modalAdd.classList.add('hidden'); addForm.reset(); });

      addForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const solicitante = document.getElementById('author').value.trim();
        const setor = document.getElementById('setor').value;
        const tipo = document.getElementById('issueType').value;
        const descricao = (tipo === 'outro') ? document.getElementById('otherText').value.trim() : document.getElementById('description').value.trim();
        const prioridade = document.getElementById('priority').value;
        
        if(!solicitante || !tipo){ alert('Preencha solicitante e tipo.'); return; }
        const item = { id: uid(), solicitante, setor, categoria: tipo.charAt(0).toUpperCase()+tipo.slice(1), descricao, prioridade, status:'pending', data_abertura:new Date().toISOString(), data_inicio:null, data_conclusao:null };
        
        try { 
          await api.createChamado(item); 
          await refreshAll();
          modalAdd.classList.add('hidden'); 
          addForm.reset(); 
        } catch(err) { alert('Erro ao criar chamado'); }
      });

      // Banner de Erro
      let _errorBannerAdded = false;
      function showErrorBanner(msg){ 
        if(_errorBannerAdded) return; 
        _errorBannerAdded = true; 
        const b = document.createElement('div'); 
        b.style.background='rgba(220,38,38,0.12)'; b.style.color='#ffdddd'; b.style.padding='8px 12px'; b.style.border='1px solid rgba(220,38,38,0.18)'; b.style.borderRadius='8px'; b.style.marginBottom='12px'; 
        b.textContent = 'Erro de Comunicação: ' + msg; 
        const main = document.querySelector('main.user-wrap'); 
        if(main) main.insertBefore(b, main.firstChild); 
      }

      // Inicialização e Polling
      refreshAll();
      setInterval(async () => {
        try {
          const nd = await api.fetchChamados(); 
          if(JSON.stringify(nd) !== JSON.stringify(data)){ data = nd; render(); }
        } catch(e) {} // Polling falha silenciosamente sem assustar o usuário
      }, 5000);

    });
  </script>
</body>
</html>
